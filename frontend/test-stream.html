<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流式输出测试</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a1a2e;
            color: #e4e4e7;
        }
        button {
            padding: 10px 20px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            background: #4f46e5;
        }
        #output {
            margin-top: 20px;
            padding: 15px;
            background: #252538;
            border: 1px solid #2d2d3d;
            border-radius: 8px;
            white-space: pre-wrap;
            max-height: 500px;
            overflow-y: auto;
        }
        .success { color: #86efac; }
        .error { color: #fca5a5; }
        .info { color: #93c5fd; }
    </style>
</head>
<body>
    <h1>流式输出测试</h1>
    
    <div>
        <button onclick="testSimpleStream()">测试简单流式输出</button>
        <button onclick="testChatStream()">测试聊天流式输出</button>
        <button onclick="clearOutput()">清空输出</button>
    </div>
    
    <div id="output"></div>

    <script>
        const output = document.getElementById('output');
        
        function log(message, type = 'info') {
            const line = document.createElement('div');
            line.className = type;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }
        
        function clearOutput() {
            output.innerHTML = '';
        }
        
        async function testSimpleStream() {
            log('开始测试简单流式输出...', 'info');
            
            try {
                const response = await fetch('http://localhost:8000/api/test/stream');
                
                if (!response.ok) {
                    log(`请求失败: ${response.status}`, 'error');
                    return;
                }
                
                log('连接成功，开始接收数据...', 'success');
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                
                while (true) {
                    const {done, value} = await reader.read();
                    
                    if (done) {
                        log('流式接收完成', 'success');
                        break;
                    }
                    
                    buffer += decoder.decode(value, {stream: true});
                    const lines = buffer.split('\\n');
                    buffer = lines.pop();
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                log(`收到数据: ${JSON.stringify(data)}`, 'success');
                            } catch (e) {
                                log(`解析失败: ${line}`, 'error');
                            }
                        }
                    }
                }
            } catch (error) {
                log(`错误: ${error.message}`, 'error');
                console.error(error);
            }
        }
        
        async function testChatStream() {
            log('开始测试聊天流式输出...', 'info');
            
            try {
                const response = await fetch('http://localhost:8000/api/chat/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        text: '你好',
                        taskId: 999
                    })
                });
                
                if (!response.ok) {
                    log(`请求失败: ${response.status}`, 'error');
                    return;
                }
                
                log('连接成功，开始接收数据...', 'success');
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let dataCount = 0;
                
                while (true) {
                    const {done, value} = await reader.read();
                    
                    if (done) {
                        log(`流式接收完成，共收到 ${dataCount} 条数据`, 'success');
                        break;
                    }
                    
                    buffer += decoder.decode(value, {stream: true});
                    const lines = buffer.split('\\n');
                    buffer = lines.pop();
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                dataCount++;
                                log(`[${dataCount}] ${data.type}: ${JSON.stringify(data).substring(0, 100)}...`, 'success');
                            } catch (e) {
                                log(`解析失败: ${line.substring(0, 100)}`, 'error');
                            }
                        }
                    }
                }
            } catch (error) {
                log(`错误: ${error.message}`, 'error');
                console.error(error);
            }
        }
    </script>
</body>
</html>
